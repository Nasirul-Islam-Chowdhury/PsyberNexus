version: '3.8'

services:
  # Supabase compatible PostgreSQL 15 Instance with PGVector
  postgres:
    image: pgvector/pgvector:15-pgdg
    container_name: psybernexus_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin_secure_pwd_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Graph Database for Student-Counselor-Region Network Reasoning
  neo4j:
    image: neo4j:5.12.0-community
    container_name: psybernexus_neo4j
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/psybernexus_secure_pass_2026
      NEO4J_PLUGINS: '["apoc", "gds"]' # Include graph algorithms library
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "psybernexus_secure_pass_2026", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # In-Memory Cache for Session Lock and Realtime Rate Limiting
  redis:
    image: redis:7.0-alpine
    container_name: psybernexus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Python ML Pipeline and Analytical Server
  fastapi:
    build:
      context: .
      dockerfile: src/backend/fastapi/Dockerfile
    container_name: psybernexus_fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:admin_secure_pwd_2026@postgres:5432/postgres
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=psybernexus_secure_pass_2026
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Local Llama 3 Inference Engine (Local RAG)
  ollama:
    image: ollama/ollama:latest
    container_name: psybernexus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # In live system, background command running "ollama run llama3" is executed

volumes:
  postgres_data:
  neo4j_data:
  neo4j_plugins:
  redis_data:
  ollama_data:
